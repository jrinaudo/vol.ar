<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Juan Rinaudo" />
    <meta name="description" content="Juan Rinaudo is a software engineer specializing in building resilient systems." />
    <meta name="keywords" content="Juan Rinaudo, software engineer, devops engineer, site reliability engineer, full stack engineer">
    <title>Juan Rinaudo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0a2a4b;
        --text-color: #ececec;
      }
      body:has(input:checked) {
        --bg-color: #ececec;
        --text-color: #3163a4;
      }
      body {
        display: flex;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Inconsolata", monospace;
        height: 100dvh;
        align-items: center;
        transition: background-color 0.3s, color 0.3s;
      }
      main {
        display: flex;
        flex-direction: column;
        margin-left: 20dvw;
        margin-right: 10dvw;
      }
      h3 {
        margin: 0;
        font-size: 1.5rem;
      }
      h5 {
        margin: 0.5rem 0 0 0;
        font-weight: normal;
        font-size: 1rem;
      }
      ul {
        font-size: 1rem;
        margin-top: 1.5rem;
      }
      li {
        margin-bottom: 0.2rem;
      }
      li::marker {
        content: "➤ ";
      }
      a {
        color: var(--text-color);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      #theme-toggle {
        font-size: 1.5rem;
        position: fixed;
        right: 1rem;
        top: 1rem;
      }
      #theme-toggle input {
        display: none;
      }
      #theme-toggle span::before {
        content: '🔆';
        cursor: pointer;
      }
      #theme-toggle input:checked + span::before {
        content: '⏾';
      }
    </style>
  </head>
  <body>
    <main>
      <h3>Juan Rinaudo</h3>
      <h5>I'm a Software Engineer passionate about building resilient systems</h5>
      <ul>
        <li><a href="https://github.com/jrinaudo" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/jmrinaudo/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
        <li><a href="mailto:hi@vol.ar">Get in touch!</a></li>
      </ul>
    </main>
    <label id="theme-toggle">
      <input type="checkbox" role="switch">
      <span></span>
    </label>
  </body>
</html>
